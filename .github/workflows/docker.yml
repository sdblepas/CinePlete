name: Build & Publish Docker

on:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read
  security-events: write

jobs:

  scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.20.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: 1

  build:
    name: Build & Push Docker
    needs: scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tags
        id: vars
        run: |
          SHA=$(git rev-parse --short HEAD)
          echo "sha=$SHA" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build image
        run: |
          docker build \
            -t sdblepas/cineplete:latest \
            -t sdblepas/cineplete:${{ steps.vars.outputs.sha }} \
            .

      - name: Push latest
        run: docker push sdblepas/cineplete:latest

      - name: Push sha tag
        run: docker push sdblepas/cineplete:${{ steps.vars.outputs.sha }}

      - name: Push version tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          docker tag sdblepas/cineplete:latest sdblepas/cineplete:$VERSION
          docker push sdblepas/cineplete:$VERSION