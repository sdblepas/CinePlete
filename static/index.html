<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Plex Audit</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-zinc-950 text-zinc-100">
  <div class="flex min-h-screen">
    <aside class="w-64 bg-zinc-900 border-r border-zinc-800 p-4">
      <div class="text-xl font-semibold mb-6">Plex Audit</div>

      <nav class="space-y-2" id="sidebarNav">
        <button class="nav w-full text-left px-3 py-2 rounded bg-zinc-800" data-tab="dashboard">Dashboard</button>

        <div class="pt-2 text-xs uppercase tracking-wide text-zinc-500">Metadata health</div>
        <button class="nav w-full text-left px-3 py-2 rounded hover:bg-zinc-800" data-tab="notmdb">No TMDB GUID</button>
        <button class="nav w-full text-left px-3 py-2 rounded hover:bg-zinc-800" data-tab="nomatch">TMDB No Match</button>

        <div class="pt-2 text-xs uppercase tracking-wide text-zinc-500">Missing</div>
        <button class="nav w-full text-left px-3 py-2 rounded hover:bg-zinc-800" data-tab="franchises">Franchises</button>
        <button class="nav w-full text-left px-3 py-2 rounded hover:bg-zinc-800" data-tab="directors">Directors</button>
        <button class="nav w-full text-left px-3 py-2 rounded hover:bg-zinc-800" data-tab="actors">Actors</button>
        <button class="nav w-full text-left px-3 py-2 rounded hover:bg-zinc-800" data-tab="classics">Classics</button>
        <button class="nav w-full text-left px-3 py-2 rounded hover:bg-zinc-800" data-tab="suggestions">Suggestions TMDB</button>
        <button class="nav w-full text-left px-3 py-2 rounded hover:bg-zinc-800" data-tab="wishlist">Wishlist</button>

        <div class="pt-2 text-xs uppercase tracking-wide text-zinc-500">Settings</div>
        <button class="nav w-full text-left px-3 py-2 rounded hover:bg-zinc-800" data-tab="config">Config</button>
      </nav>

      <div class="mt-6 space-y-2">
        <button id="scanBtn" class="w-full px-3 py-2 rounded bg-emerald-600 hover:bg-emerald-500 text-black font-semibold">
          Rescan
        </button>
        <div class="text-xs text-zinc-400" id="status"></div>
      </div>
    </aside>

    <main class="flex-1 p-6">
      <div id="topFilters" class="flex flex-wrap gap-3 items-center mb-6">
        <input id="search" class="bg-zinc-900 border border-zinc-800 rounded px-3 py-2 w-80"
               placeholder="Search title / group..." />

        <select id="yearFilter" class="bg-zinc-900 border border-zinc-800 rounded px-3 py-2">
          <option value="">All years</option>
          <option value="2020s">2020s</option>
          <option value="2010s">2010s</option>
          <option value="2000s">2000s</option>
          <option value="1990s">1990s</option>
          <option value="older">Older</option>
        </select>

        <select id="sort" class="bg-zinc-900 border border-zinc-800 rounded px-3 py-2">
          <option value="popularity">Sort: popularity</option>
          <option value="rating">Sort: rating</option>
          <option value="votes">Sort: votes</option>
          <option value="year">Sort: year</option>
          <option value="title">Sort: title</option>
        </select>
      </div>

      <div id="content"></div>
    </main>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
