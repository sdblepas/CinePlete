# CinePlete — sample configuration
# Copy this file to your /config volume as config.yml
# All values shown are defaults unless marked otherwise.

LIBRARIES: []   # managed by the UI; leave empty on first run

SERVER:
  UI_PORT: 8787
  TZ: "Asia/Jerusalem"
  MEDIA_SERVER: "plex"      # "plex" | "jellyfin" | "emby"

PLEX:
  PLEX_URL: ""
  PLEX_TOKEN: ""
  LIBRARY_NAME: ""
  PLEX_PAGE_SIZE: 500
  SHORT_MOVIE_LIMIT: 60

JELLYFIN:
  JELLYFIN_URL: ""
  JELLYFIN_API_KEY: ""
  JELLYFIN_LIBRARY_NAME: "Movies"
  JELLYFIN_PAGE_SIZE: 500
  SHORT_MOVIE_LIMIT: 60

EMBY:
  EMBY_URL: ""
  EMBY_API_KEY: ""
  EMBY_LIBRARY_NAME: "Movies"
  EMBY_PAGE_SIZE: 500
  SHORT_MOVIE_LIMIT: 60

TMDB:
  TMDB_API_KEY: ""
  TMDB_MIN_DELAY: 0.02
  TMDB_WORKERS: 6

CLASSICS:
  CLASSICS_PAGES: 4
  CLASSICS_MIN_VOTES: 5000
  CLASSICS_MIN_RATING: 8.0
  CLASSICS_MAX_RESULTS: 120

ACTOR_HITS:
  ACTOR_MIN_VOTES: 500
  ACTOR_MAX_RESULTS_PER_ACTOR: 10

SUGGESTIONS:
  SUGGESTIONS_MAX_RESULTS: 100
  SUGGESTIONS_MIN_SCORE: 2

AUTOMATION:
  LIBRARY_POLL_INTERVAL: 30   # minutes (0 = disabled)
  AUTO_SCAN_SCHEDULE: "off"   # "off" | "daily" | "weekly"

TELEGRAM:
  TELEGRAM_ENABLED: false
  TELEGRAM_BOT_TOKEN: ""
  TELEGRAM_CHAT_ID: ""
  TELEGRAM_MIN_INTERVAL: 30

RADARR:
  RADARR_ENABLED: false
  RADARR_URL: ""
  RADARR_API_KEY: ""
  RADARR_ROOT_FOLDER_PATH: ""
  RADARR_QUALITY_PROFILE_ID: 6
  RADARR_MONITORED: true
  RADARR_SEARCH_ON_ADD: false
  RADARR_GRAB_POLL_INTERVAL: 5

RADARR_4K:
  RADARR_4K_ENABLED: false
  RADARR_4K_URL: ""
  RADARR_4K_ROOT_FOLDER_PATH: ""
  RADARR_4K_QUALITY_PROFILE_ID: 6
  RADARR_4K_MONITORED: true
  RADARR_4K_SEARCH_ON_ADD: false

OVERSEERR:
  OVERSEERR_ENABLED: false
  OVERSEERR_URL: ""
  OVERSEERR_API_KEY: ""

JELLYSEERR:
  JELLYSEERR_ENABLED: false
  JELLYSEERR_URL: ""
  JELLYSEERR_API_KEY: ""

WEBHOOK:
  WEBHOOK_ENABLED: false
  WEBHOOK_SECRET: ""

WATCHTOWER:
  WATCHTOWER_ENABLED: false
  WATCHTOWER_URL: ""
  WATCHTOWER_API_TOKEN: ""

FLARESOLVERR:
  FLARESOLVERR_URL: ""   # e.g. http://flaresolverr:8191

AUTH:
  AUTH_METHOD: "None"    # "None" | "Forms" | "DisabledForLocalAddresses"
  AUTH_USERNAME: ""
  AUTH_PASSWORD_HASH: ""
  AUTH_PASSWORD_SALT: ""
  AUTH_SECRET_KEY: ""    # auto-generated on first save
  TRUSTED_PROXIES: ""
