version: "3.9"

services:
  plex-audit:
    image: python:3.11-slim
    container_name: plex-audit
    network_mode: host
    env_file:
      - .env
    volumes:
      - /volume1/Docker/plex-audit:/app
    working_dir: /app
    command: >
      bash -c "
      pip install --no-cache-dir fastapi uvicorn requests python-dotenv &&
      uvicorn app.web:app --host 0.0.0.0 --port ${UI_PORT}
      "
    restart: unless-stopped